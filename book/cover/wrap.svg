<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3911" height="2775"
     viewBox="0 0 3911 2775" font-family="Liberation Sans, DejaVu Sans, sans-serif">
  <rect x="0" y="0" width="3911" height="2775" fill="#141414"/>

  <!-- ============ FRONT PANEL (right) ============ -->
  <!-- Nim-style crown as a 2D plot -->
  <g transform="translate(2665,115 ) scale(1.03)">
    <g stroke="#2c2c2c" stroke-width="2">
      <line x1="40" y1="20" x2="40" y2="420"/>   <line x1="92" y1="20" x2="92" y2="420"/>
      <line x1="144" y1="20" x2="144" y2="420"/> <line x1="196" y1="20" x2="196" y2="420"/>
      <line x1="248" y1="20" x2="248" y2="420"/> <line x1="300" y1="20" x2="300" y2="420"/>
      <line x1="352" y1="20" x2="352" y2="420"/> <line x1="404" y1="20" x2="404" y2="420"/>
      <line x1="456" y1="20" x2="456" y2="420"/> <line x1="508" y1="20" x2="508" y2="420"/>
      <line x1="560" y1="20" x2="560" y2="420"/>
      <line x1="40" y1="60" x2="560" y2="60"/>   <line x1="40" y1="110" x2="560" y2="110"/>
      <line x1="40" y1="160" x2="560" y2="160"/> <line x1="40" y1="210" x2="560" y2="210"/>
      <line x1="40" y1="260" x2="560" y2="260"/> <line x1="40" y1="310" x2="560" y2="310"/>
      <line x1="40" y1="360" x2="560" y2="360"/> <line x1="40" y1="410" x2="560" y2="410"/>
    </g>
    <g stroke="#5a5a5a" stroke-width="3">
      <line x1="40" y1="410" x2="560" y2="410"/> <line x1="40" y1="410" x2="40" y2="20"/>
    </g>
    <polygon points="40,410 150,110 225,300 300,55 375,300 450,110 560,410" fill="#FFE953" fill-opacity="0.12"/>
    <polyline points="40,410 150,110 225,300 300,55 375,300 450,110 560,410 40,410"
              fill="none" stroke="#FFE953" stroke-width="9" stroke-linejoin="round" stroke-linecap="round"/>
    <g fill="#141414" stroke="#FFE953" stroke-width="6">
      <circle cx="150" cy="110" r="13"/> <circle cx="225" cy="300" r="13"/>
      <circle cx="300" cy="55" r="13"/>  <circle cx="375" cy="300" r="13"/>
      <circle cx="450" cy="110" r="13"/>
    </g>
  </g>
  <g font-weight="bold" fill="#FFE953" text-anchor="middle">
    <text x="2974" y="805" font-size="185" letter-spacing="-4">NUMERICAL</text>
    <text x="2974" y="1000" font-size="185" letter-spacing="-4">ALGORITHMS</text>
    <text x="2974" y="1195" font-size="185" letter-spacing="-4">IN NIM</text>
  </g>
  <text x="2974" y="1335" text-anchor="middle" font-size="62" fill="#f2f2f2">Applications in Physics, Biology, Finance</text>
  <rect x="2824" y="1385" width="300" height="9" fill="#FFE953"/>
  <text x="2974" y="2550" text-anchor="middle" font-weight="bold" font-size="100" fill="#ffffff">Massimo Di Pierro</text>
  <text x="2974" y="2630"  text-anchor="middle" font-size="50" fill="#FFE953" letter-spacing="2">EXPERTS4SOLUTIONS</text>

  <!-- ============ SPINE ============ -->
  <g transform="translate(1956, 1387) rotate(90)"
     text-anchor="middle">
    <text x="0" y="20" font-size="56">
      <tspan font-weight="bold" fill="#FFE953">NUMERICAL ALGORITHMS IN NIM</tspan><tspan dx="44" fill="#f2f2f2">Massimo Di Pierro</tspan>
    </text>
  </g>

  <!-- ============ BACK PANEL (left) ============ -->
  <rect x="113" y="75" width="280" height="16" fill="#FFE953"/>
  <text x="113" y="195" font-weight="bold" font-size="62" fill="#FFE953">About the Author</text>
  <!-- bio: left-aligned, ~50% wider column -->
  <g font-size="40" fill="#f2f2f2">
    <text x="113" y="305">Massimo Di Pierro is a physicist, computer scientist, software</text>
    <text x="113" y="361">architect, and educator with deep experience in scientific computing,</text>
    <text x="113" y="417">simulation, web technologies, and financial systems. He has held</text>
    <text x="113" y="473">academic and industry leadership roles, including serving as a tenured</text>
    <text x="113" y="529">Professor of Computer Science at DePaul University and leading</text>
    <text x="113" y="585">simulation infrastructure at SpaceX, where he worked on high-fidelity</text>
    <text x="113" y="641">systems used across the Falcon, Dragon, Starship, and Starlink programs.</text>
  </g>
  <text x="113" y="2630" font-size="44" fill="#FFE953" letter-spacing="2">EXPERTS4SOLUTIONS</text>
</svg>
