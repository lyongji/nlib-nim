<?xml version="1.0" encoding="UTF-8"?>
<!-- Nim-style crown rendered as a 2D plot: grid + polyline + data markers -->
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="460" viewBox="0 0 600 460">
  <!-- plot grid -->
  <g stroke="#2c2c2c" stroke-width="2">
    <line x1="40"  y1="20" x2="40"  y2="420"/>
    <line x1="92"  y1="20" x2="92"  y2="420"/>
    <line x1="144" y1="20" x2="144" y2="420"/>
    <line x1="196" y1="20" x2="196" y2="420"/>
    <line x1="248" y1="20" x2="248" y2="420"/>
    <line x1="300" y1="20" x2="300" y2="420"/>
    <line x1="352" y1="20" x2="352" y2="420"/>
    <line x1="404" y1="20" x2="404" y2="420"/>
    <line x1="456" y1="20" x2="456" y2="420"/>
    <line x1="508" y1="20" x2="508" y2="420"/>
    <line x1="560" y1="20" x2="560" y2="420"/>
    <line x1="40" y1="60"  x2="560" y2="60"/>
    <line x1="40" y1="110" x2="560" y2="110"/>
    <line x1="40" y1="160" x2="560" y2="160"/>
    <line x1="40" y1="210" x2="560" y2="210"/>
    <line x1="40" y1="260" x2="560" y2="260"/>
    <line x1="40" y1="310" x2="560" y2="310"/>
    <line x1="40" y1="360" x2="560" y2="360"/>
    <line x1="40" y1="410" x2="560" y2="410"/>
  </g>
  <!-- axes -->
  <g stroke="#5a5a5a" stroke-width="3">
    <line x1="40" y1="410" x2="560" y2="410"/>
    <line x1="40" y1="410" x2="40"  y2="20"/>
  </g>

  <!-- crown area wash -->
  <polygon points="40,410 150,110 225,300 300,55 375,300 450,110 560,410"
           fill="#FFE953" fill-opacity="0.12"/>
  <!-- crown silhouette as a plotted line -->
  <polyline points="40,410 150,110 225,300 300,55 375,300 450,110 560,410 40,410"
            fill="none" stroke="#FFE953" stroke-width="9"
            stroke-linejoin="round" stroke-linecap="round"/>

  <!-- data-point markers at the peaks/valleys -->
  <g fill="#141414" stroke="#FFE953" stroke-width="6">
    <circle cx="150" cy="110" r="13"/>
    <circle cx="225" cy="300" r="13"/>
    <circle cx="300" cy="55"  r="13"/>
    <circle cx="375" cy="300" r="13"/>
    <circle cx="450" cy="110" r="13"/>
  </g>
</svg>
